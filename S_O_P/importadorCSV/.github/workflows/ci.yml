name: Java CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar proyecto
        run: |
          cd S_O_P
          mkdir -p out
          find src -name "*.java" > sources.txt
          javac -d out @sources.txt

      - name: Ejecutar importador
        run: |
          cd S_O_P
          echo "\"ID\",\"tipo_entrada\",\"moneda\",\"valor\",\"descripcion\"" > data/test.csv
          echo "\"1\",\"in\",\"MXN\",\"100\",\"test\"" >> data/test.csv
          java -cp out Main data/test.csv