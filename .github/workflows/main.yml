name: Java CI
on:
  push:
    branches: [ "B21_NayibMarquez/CSV-IMPORTER-B" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Test
        # Esto ejecuta tu TestRunner para generar el reporte
        run: |
          javac -d out src/*.java
          java -cp out com.axity.TestRunner
        env:
          IMPORT_BASE_DIR: ${{ github.workspace }}