name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile main classes
        run: |
          mkdir -p out
          javac -d out $(find src -maxdepth 1 -name "*.java") $(find src/dto -name "*.java") $(find src/service -name "*.java")

      - name: Compile test classes
        run: |
          javac -d out -cp out $(find src/test -name "*.java")

      - name: Run tests
        env:
          IMPORT_BASE_DIR: .
        run: |
          java -cp out test.TestRunner
